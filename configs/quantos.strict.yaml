# QuantOS 2.0 — strict mode（全A严格档，需强机器/云端；默认不启用）
mode: strict
market: a_share
paper_trading_only: true
real_broker_auto_order: false
universe: all_a_tradable
max_symbols: 5500
frequency: daily

data:
  providers: [local_warehouse, akshare, tushare, baostock]
  allow_fixture: false          # 严格档禁止 fixture 进入任何输出
  history_target_years: 10
  require_adj_factors: true
  require_pit_universe: true    # 股票池必须按历史日期构建（幸存者偏差）

kronos:
  enabled: true
  default_model: kronos-mini
  optional_models: [kronos-small, kronos-base]
  monte_carlo_paths: 100
  training: light_finetune_optional   # 仅轻量微调，需显式开启

research:
  search: optuna
  trials: 500
  walk_forward: true
  cpcv: true

validation:
  walk_forward: true
  purged_kfold: true
  cpcv: true
  embargo_days: 10
  transaction_cost_bps: 8
  slippage_bps: 15
  benchmark: "000300.SH"
  min_oos_sharpe: 1.0
  max_drawdown_pct: -12.0
  require_oos_outperformance: true
  require_regime_breakdown: true

risk:
  max_single_position: 0.08
  max_industry_exposure: 0.25
  exclude_st: true
  risk_manager_veto: true

agents:
  enabled: true
  language: zh
  engine: deterministic_rules_v1
  require_json_io: true

reports: {markdown: true, pdf: true, include_disclaimer: true, degraded_summary_required: true}
