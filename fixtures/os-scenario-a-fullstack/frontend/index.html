<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OS Scenario A — Item Tracker</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="app" data-testid="app-root">
    <header>
      <h1>OS Scenario A</h1>
      <p class="subtitle">Full-stack validation fixture (local only)</p>
    </header>
    <section id="status" class="status" aria-live="polite" data-testid="status">Ready</section>
    <section class="panel">
      <h2>Add item</h2>
      <form id="item-form" data-testid="item-form">
        <label>Title <input name="title" type="text" required minlength="2" maxlength="80" data-testid="title-input" /></label>
        <label>Quantity <input name="quantity" type="number" min="1" max="999" value="1" data-testid="qty-input" /></label>
        <button type="submit" data-testid="submit-btn">Add</button>
      </form>
      <p id="form-error" class="error hidden" data-testid="form-error"></p>
    </section>
    <section class="panel">
      <div class="row">
        <h2>Items</h2>
        <button type="button" id="refresh" data-testid="refresh-btn">Refresh</button>
        <button type="button" id="error-demo" data-testid="error-demo-btn">Test error</button>
      </div>
      <div id="loading" class="loading hidden" data-testid="loading">Loading…</div>
      <ul id="items" data-testid="items-list"></ul>
      <p id="list-error" class="error hidden" data-testid="list-error"></p>
    </section>
  </main>
  <script src="/app.js" type="module"></script>
</body>
</html>
